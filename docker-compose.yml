services:
  app:
    build: .
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      STS2_DATABASE_URL: postgresql://sts2:sts2@db:5432/sts2
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: sts2
      POSTGRES_PASSWORD: sts2
      POSTGRES_DB: sts2
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sts2"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
